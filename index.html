<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>9試合 星取表シミュレーター</title>

<style>
body {
  font-family: sans-serif;
  max-width: 900px;
  margin: 16px auto;
  padding: 0 12px 24px;
  background: #f7f7f7;
  color: #222;
}

h1 {
  font-size: 24px;
}

.box, .card {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

.row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.field {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 150px;
}

label {
  font-weight: bold;
  margin-bottom: 6px;
  font-size: 14px;
}

input, button {
  font-size: 16px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  margin-top: 12px;
  background: #1f6feb;
  color: white;
  font-weight: bold;
  border: none;
}

.note {
  font-size: 13px;
  color: #666;
  margin-top: 10px;
}

.summary {
  font-weight: bold;
  margin: 12px 0;
}

.card.exact {
  border: 2px solid #16a34a;
  background: #f0fff4;
}

.card.near {
  border: 2px solid #f59e0b;
  background: #fffaf0;
}

.title {
  font-weight: bold;
  font-size: 17px;
  margin-bottom: 8px;
}

.meta {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  font-size: 14px;
}

.patterns {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.chip {
  background: #eef2ff;
  border: 1px solid #c7d2fe;
  border-radius: 999px;
  padding: 6px 10px;
  font-family: monospace;
  font-size: 15px;
}

.badge {
  display: inline-block;
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 999px;
  margin-left: 6px;
  color: #fff;
}

.green { background: #16a34a; }
.orange { background: #f59e0b; }

@media (max-width: 640px) {
  .meta {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h1>9試合 星取表シミュレーター</h1>

<div class="box">
  <div class="row">
    <div class="field">
      <label for="currentScore">現在得点</label>
      <input type="number" id="currentScore" value="0">
    </div>

    <div class="field">
      <label for="targetScore">目標最終得点</label>
      <input type="number" id="targetScore" value="30">
    </div>
  </div>

  <button onclick="calculate()">計算する</button>

  <div class="note">
    ※ 全9試合固定。<br>
    ※ 1・4・7試合目の勝利点は +2、それ以外は +3。<br>
    ※ 1億ボーナスは毎試合 +1 として計算。<br>
    ※ 連勝ボーナスは、勝ちが続くたびに +1。<br>
    ※ 目標得点 ±3点 の組み合わせを表示。
  </div>
</div>

<div id="summary" class="summary"></div>
<div id="result"></div>

<script>
function winPointByGame(gameNumber) {
  if (gameNumber === 1 || gameNumber === 4 || gameNumber === 7) {
    return 2;
  }
  return 3;
}

function calculate() {
  const currentScore = Number(document.getElementById("currentScore").value);
  const targetScore = Number(document.getElementById("targetScore").value);

  const totalGames = 9;
  const tolerance = 3;
  const totalPatterns = Math.pow(2, totalGames);

  const groupedMap = new Map();

  for (let mask = 0; mask < totalPatterns; mask++) {
    const results = [];

    for (let i = totalGames - 1; i >= 0; i--) {
      const isWin = (mask & (1 << i)) !== 0;
      results.push(isWin ? "○" : "×");
    }

    let gainedScore = 0;
    let winCount = 0;
    let winPointTotal = 0;
    let billionBonus = 0;
    let streakBonus = 0;
    let prevWin = false;

    for (let i = 0; i < results.length; i++) {
      const gameNumber = i + 1;
      const isWin = results[i] === "○";

      // 1億ボーナスは毎試合 +1
      gainedScore += 1;
      billionBonus += 1;

      if (isWin) {
        const winPoint = winPointByGame(gameNumber);
        gainedScore += winPoint;
        winPointTotal += winPoint;
        winCount++;

        if (prevWin) {
          gainedScore += 1;
          streakBonus += 1;
        }
      }

      prevWin = isWin;
    }

    const finalScore = currentScore + gainedScore;
    const diff = finalScore - targetScore;

    if (Math.abs(diff) <= tolerance) {
      const key = `${winCount}_${winPointTotal}_${streakBonus}_${finalScore}`;
      const patternText = results.join("");

      if (!groupedMap.has(key)) {
        groupedMap.set(key, {
          winCount,
          winPointTotal,
          billionBonus,
          streakBonus,
          gainedScore,
          finalScore,
          diff,
          patterns: []
        });
      }

      groupedMap.get(key).patterns.push(patternText);
    }
  }

  const groups = Array.from(groupedMap.values());

  groups.sort((a, b) => {
    if (Math.abs(a.diff) !== Math.abs(b.diff)) {
      return Math.abs(a.diff) - Math.abs(b.diff);
    }
    if (a.winCount !== b.winCount) {
      return a.winCount - b.winCount;
    }
    return a.streakBonus - b.streakBonus;
  });

  render(groups);
}

function render(groups) {
  const summary = document.getElementById("summary");
  const result = document.getElementById("result");

  summary.textContent = `該当グループ: ${groups.length}件`;

  if (groups.length === 0) {
    result.innerHTML = '<div class="card">目標得点 ±3点 に入る組み合わせはありません。</div>';
    return;
  }

  let html = "";

  for (const group of groups) {
    const diffText = group.diff > 0 ? `+${group.diff}` : `${group.diff}`;

    let cardClass = "card";
    let badge = "";

    if (group.diff === 0) {
      cardClass += " exact";
      badge = '<span class="badge green">ピッタリ</span>';
    } else if (Math.abs(group.diff) <= 1) {
      cardClass += " near";
      badge = '<span class="badge orange">おしい</span>';
    }

    const patternHtml = group.patterns
      .sort()
      .map(p => `<span class="chip">${p}</span>`)
      .join("");

    html += `
      <div class="${cardClass}">
        <div class="title">
          最終得点: ${group.finalScore}点 ${badge}
        </div>

        <div class="meta">
          <div>目標との差: <strong>${diffText}</strong></div>
          <div>獲得点: <strong>${group.gainedScore}</strong></div>
          <div>勝数: <strong>${group.winCount}</strong></div>
          <div>勝利点合計: <strong>${group.winPointTotal}</strong></div>
          <div>1億ボーナス: <strong>${group.billionBonus}</strong></div>
          <div>連勝ボーナス: <strong>${group.streakBonus}</strong></div>
          <div>パターン数: <strong>${group.patterns.length}</strong></div>
        </div>

        <div class="patterns">
          ${patternHtml}
        </div>
      </div>
    `;
  }

  result.innerHTML = html;
}

calculate();
</script>

</body>
</html>
