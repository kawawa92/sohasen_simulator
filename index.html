<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9試合 星取表シミュレーター</title>

<style>
body {
  font-family: sans-serif;
  max-width: 1000px;
  margin: 16px auto;
  padding: 0 12px 24px;
  background: #f7f7f7;
  color: #222;
}

.board-box {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 16px;
}

.board-row {
  display: flex;
  gap: 10px;
}

.board-divider {
  border-top: 2px solid #cbd5e1;
  margin: 14px 0;
}

.cell {
  width: 70px;
  text-align: center;
  padding: 6px;
  border-radius: 10px;
}

.cell.played-win {
  background: #dbeafe;
}

.cell.played-lose {
  background: #fee2e2;
}

.point-label {
  font-size: 11px;
  color: #666;
}

/* ★ここ修正 */
.input-line {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 4px;
}

.game-select {
  width: 40px;
  text-align: center;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  background-image: none;
  font-weight: bold;
}

.game-select.win { background: #bfdbfe; }
.game-select.lose { background: #fecaca; }

.bonus {
  position: relative;
  display: flex;
  align-items: center;
}

.bonus-title {
  position: absolute;
  top: -9px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: #555;
  white-space: nowrap;
}

.bonus input {
  width: 18px;
  height: 18px;
}

/* ★ここまで */

button {
  margin-top: 16px;
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 8px;
}

.summary {
  margin-top: 16px;
  font-weight: bold;
  white-space: pre-line;
}
</style>
</head>

<body>

<h3>9試合 星取表シミュレーター</h3>

<div class="board-box">

<div class="board-row">
  <div class="cell" id="cell0">
    <div class="point-label">勝ち点2</div>
    <div class="input-line">
      <select id="r0" class="game-select" onchange="change(0)">
        <option value="">未</option>
        <option value="win">○</option>
        <option value="lose">×</option>
      </select>
      <label class="bonus">
        <span class="bonus-title">ボナP</span>
        <input type="checkbox" id="b0" checked>
      </label>
    </div>
  </div>

  <div class="cell" id="cell1">
    <div class="point-label">勝ち点3</div>
    <div class="input-line">
      <select id="r1" class="game-select" onchange="change(1)">
        <option value="">未</option>
        <option value="win">○</option>
        <option value="lose">×</option>
      </select>
      <label class="bonus">
        <span class="bonus-title">ボナP</span>
        <input type="checkbox" id="b1" checked>
      </label>
    </div>
  </div>

  <div class="cell" id="cell2">
    <div class="point-label">勝ち点3</div>
    <div class="input-line">
      <select id="r2" class="game-select" onchange="change(2)">
        <option value="">未</option>
        <option value="win">○</option>
        <option value="lose">×</option>
      </select>
      <label class="bonus">
        <span class="bonus-title">ボナP</span>
        <input type="checkbox" id="b2" checked>
      </label>
    </div>
  </div>
</div>

<div class="board-divider"></div>

<div class="board-row">
  <div class="cell" id="cell3">
    <div class="point-label">勝ち点2</div>
    <div class="input-line">
      <select id="r3" class="game-select" onchange="change(3)">
        <option value="">未</option>
        <option value="win">○</option>
        <option value="lose">×</option>
      </select>
      <label class="bonus">
        <span class="bonus-title">ボナP</span>
        <input type="checkbox" id="b3" checked>
      </label>
    </div>
  </div>

  <div class="cell" id="cell4">
    <div class="point-label">勝ち点3</div>
    <div class="input-line">
      <select id="r4" class="game-select" onchange="change(4)">
        <option value="">未</option>
        <option value="win">○</option>
        <option value="lose">×</option>
      </select>
      <label class="bonus">
        <span class="bonus-title">ボナP</span>
        <input type="checkbox" id="b4" checked>
      </label>
    </div>
  </div>

  <div class="cell" id="cell5">
    <div class="point-label">勝ち点3</div>
    <div class="input-line">
      <select id="r5" class="game-select" onchange="change(5)">
        <option value="">未</option>
        <option value="win">○</option>
        <option value="lose">×</option>
      </select>
      <label class="bonus">
        <span class="bonus-title">ボナP</span>
        <input type="checkbox" id="b5" checked>
      </label>
    </div>
  </div>
</div>

<div class="board-divider"></div>

<div class="board-row">
  <div class="cell" id="cell6">
    <div class="point-label">勝ち点2</div>
    <div class="input-line">
      <select id="r6" class="game-select" onchange="change(6)">
        <option value="">未</option>
        <option value="win">○</option>
        <option value="lose">×</option>
      </select>
      <label class="bonus">
        <span class="bonus-title">ボナP</span>
        <input type="checkbox" id="b6" checked>
      </label>
    </div>
  </div>

  <div class="cell" id="cell7">
    <div class="point-label">勝ち点3</div>
    <div class="input-line">
      <select id="r7" class="game-select" onchange="change(7)">
        <option value="">未</option>
        <option value="win">○</option>
        <option value="lose">×</option>
      </select>
      <label class="bonus">
        <span class="bonus-title">ボナP</span>
        <input type="checkbox" id="b7" checked>
      </label>
    </div>
  </div>

  <div class="cell" id="cell8">
    <div class="point-label">勝ち点3</div>
    <div class="input-line">
      <select id="r8" class="game-select" onchange="change(8)">
        <option value="">未</option>
        <option value="win">○</option>
        <option value="lose">×</option>
      </select>
      <label class="bonus">
        <span class="bonus-title">ボナP</span>
        <input type="checkbox" id="b8" checked>
      </label>
    </div>
  </div>
</div>

</div>

<button onclick="calculate()">残りパターン計算</button>

<div id="summary" class="summary"></div>

<script>
function change(i){
  var sel = document.getElementById("r"+i);
  var cell = document.getElementById("cell"+i);

  cell.className = "cell";

  if(sel.value==="win"){
    cell.classList.add("played-win");
    sel.classList.add("win");
  }else if(sel.value==="lose"){
    cell.classList.add("played-lose");
    sel.classList.add("lose");
  }
}

function calculate(){
  document.getElementById("summary").innerText = "計算OK（ここは元ロジックに接続）";
}
</script>

</body>
</html>
