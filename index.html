<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9試合 星取表</title>

<style>
body {
  font-family: sans-serif;
  max-width: 1000px;
  margin: 16px auto;
  padding: 10px;
  background: #f7f7f7;
}

.box {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
}

.board-row {
  display: flex;
  gap: 8px;
}

.board-divider {
  border-top: 2px solid #cbd5e1;
  margin: 10px 0;
}

.cell {
  width: 70px;
  text-align: center;
  padding: 6px;
  border-radius: 10px;
}

.cell.win { background: #dbeafe; }
.cell.lose { background: #fee2e2; }

.game-title { font-size: 12px; font-weight: bold; }
.point-label { font-size: 11px; color: #666; }

.input-line {
  display: flex;
  align-items: center;
  gap: 4px;
  justify-content: center;
}

select {
  width: 50px;
  text-align: center;
}

.bonus-inline {
  font-size: 11px;
}

.score {
  font-weight: bold;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
}

.summary {
  white-space: pre-line;
  margin-top: 10px;
}

.result-card {
  background: #fff;
  border: 1px solid #ddd;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h3>9試合 星取表</h3>

<div class="box">
目標得点 <input id="target" type="number">
</div>

<div class="box" id="board"></div>

<div class="score" id="score">累計得点: 0点</div>

<button onclick="calc()">残りパターン計算</button>

<div class="summary" id="summary"></div>
<div id="result"></div>

<script>
var winPoints=[2,3,3,2,3,3,2,3,3];

function createBoard(){
  let html="";
  for(let i=0;i<9;i++){
    if(i%3===0 && i!==0) html+='<div class="board-divider"></div>';
    if(i%3===0) html+='<div class="board-row">';
    html+=`
    <div class="cell" id="cell${i}">
      <div class="game-title">${i+1}</div>
      <div class="point-label">勝ち点${winPoints[i]}</div>
      <div class="input-line">
        <select id="r${i}" onchange="update()">
          <option value="">-</option>
          <option value="w">○</option>
          <option value="l">×</option>
        </select>
        <label class="bonus-inline">
          <input type="checkbox" id="b${i}" checked onchange="update()">ボ
        </label>
      </div>
    </div>`;
    if(i%3===2) html+='</div>';
  }
  document.getElementById("board").innerHTML=html;
}
createBoard();

function update(){
  let score=0,prev=false;

  for(let i=0;i<9;i++){
    let r=document.getElementById("r"+i).value;
    let b=document.getElementById("b"+i).checked;
    let cell=document.getElementById("cell"+i);

    cell.className="cell";

    if(r==="w"){
      score+=winPoints[i];
      if(prev) score+=1;
      prev=true;
      cell.classList.add("win");
    }else if(r==="l"){
      prev=false;
      cell.classList.add("lose");
    }

    if(b) score+=1;
  }

  document.getElementById("score").innerText="累計得点: "+score+"点";
}

function calc(){
  let target=document.getElementById("target").value;
  if(target===""){
    document.getElementById("summary").innerText="目標得点を入力して";
    return;
  }

  target=Number(target);

  let res=[],bon=[];
  for(let i=0;i<9;i++){
    res.push(document.getElementById("r"+i).value);
    bon.push(document.getElementById("b"+i).checked?1:0);
  }

  let fixed=[];
  for(let i=0;i<9;i++){
    if(res[i]==="") break;
    fixed.push(res[i]);
  }

  let base=0,prev=false;
  for(let i=0;i<fixed.length;i++){
    if(bon[i]) base+=1;
    if(fixed[i]==="w"){
      base+=winPoints[i];
      if(prev) base+=1;
      prev=true;
    }else prev=false;
  }

  let remain=9-fixed.length;
  let total=Math.pow(2,remain);
  let match=0;
  let html="";

  for(let m=0;m<total;m++){
    let score=base;
    let p=prev;
    let str="";

    for(let i=0;i<remain;i++){
      let win=(m>>i)&1;
      let idx=fixed.length+i;

      if(bon[idx]) score+=1;

      if(win){
        score+=winPoints[idx];
        if(p) score+=1;
        p=true;
        str+="○";
      }else{
        p=false;
        str+="×";
      }
    }

    if(Math.abs(score-target)<=3){
      match++;
      html+=`<div class="result-card">${str} → ${score}点</div>`;
    }
  }

  document.getElementById("summary").innerText=
    "総パターン: "+total+"\n一致: "+match;

  document.getElementById("result").innerHTML=html||"該当なし";
}
</script>

</body>
</html>
